# ===============================
# BASE DE DATOS (Supabase / PostgreSQL)
# ===============================
# Nunca pongas credenciales aqui: solo en Render -> Environment.
#
# Formato URL para Supabase (obligatorio prefijo jdbc: y SSL):
#   jdbc:postgresql://db.<PROJECT-REF>.supabase.co:5432/postgres?sslmode=require
#
# Si en Render ves: PSQLException "Network is unreachable" / SocketException:
#   - El hostname directo a veces solo resuelve a IPv6 y el contenedor no llega.
#   - Solucion 1: el Dockerfile ya fuerza -Djava.net.preferIPv4Stack=true
#   - Solucion 2: en Supabase usa "Connection pooling" / pooler (host aws-0-*.pooler.supabase.com)
#     y copia URI/session o transaction; convierte a jdbc:postgresql://...?sslmode=require
#     y si es puerto 6543 anade &prepareThreshold=0 a la URL.
#
# Si usas el Pooler en modo transaccion (puerto 6543), PostgreSQL JDBC + PgBouncer
# suele necesitar desactivar server-side prepared statements. Opciones:
#   A) Anadir a la URL: &prepareThreshold=0
#   B) O dejar la propiedad Hikari de abajo (apply igualmente)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari: compatible con Supabase Pooler (PgBouncer)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# SERVIDOR (Render inyecta PORT)
# ===============================
server.port=${PORT:8080}

# ===============================
# CORS (Frontend Vercel + local)
# ===============================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://matador-house.vercel.app,http://localhost:3000}

# ===============================
# EXTRAS
# ===============================
spring.jackson.serialization.indent_output=true

# Log util al migrar (desactiva despues si molesta)
logging.level.org.springframework.orm.jpa=INFO
logging.level.org.hibernate.orm.jdbc=WARN
